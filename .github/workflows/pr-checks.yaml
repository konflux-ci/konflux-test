name: Validate PRs

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  YAML-Linter:
    runs-on: ubuntu-latest
    steps:
      - name: yaml-lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .

  Dockerfile-linter:
    name: Check Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  regal-lint:
    name: Regal Rego linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Run Regal
        uses: StyraInc/regal-action@v2.0.0
        with:
          args: lint policies/ unittests/ hack/

  opa-fmt-check:
    name: Check OPA formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install OPA
        run: |
          sudo curl -L -o /usr/bin/opa https://openpolicyagent.org/downloads/v0.56.0/opa_linux_amd64_static
          sudo chmod 755 /usr/bin/opa
      - name: Check OPA formatting
        run: |
          diff=$(opa fmt --diff policies/ unittests/ hack/)
          if [ -n "$diff" ]; then
            echo "::error::OPA formatting check failed. Run 'opa fmt -w policies/ unittests/ hack/' to fix."
            echo "$diff"
            exit 1
          fi

  opa_policies_unittest:
    name: opa_policies_unittest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependency packages
        run: |
         sudo apt-get install jq
         sudo curl -L -o /usr/bin/opa https://openpolicyagent.org/downloads/v0.56.0/opa_linux_amd64_static
         sudo chmod 755 /usr/bin/opa

      - name: Run unittests for policies
        run: |
          set -o pipefail
          TEST_FILES="./policies ./unittests ./unittests/test_data"
          /usr/bin/opa test --coverage --format json $TEST_FILES \
            | { T=`mktemp`; \
              tee $T; \
             /usr/bin/opa eval \
              --format pretty \
              --input $T \
              --data hack/simplecov.rego \
              data.simplecov.from_opa > coverage.json; \
            rm -f $T || true; } \
          | jq -j -r 'if .coverage < 100 then "ERROR: Code coverage threshold not met: got \(.coverage) instead of 100.00\n" | halt_error(1) else "" end'

      - name: Upload test coverage report
        uses: codecov/codecov-action@v7
        if: always()

  bash_unittests:
    name: bash_unittests
    runs-on: ubuntu-latest
    steps:
      - name: Setup BATS
        uses: mig4/setup-bats@v1
        with:
          bats-version: 1.8.2

      - name: Install required packages
        run: sudo apt-get install -y jq

      - name: Install cosign
        run: |
          # Install cosign
          curl -O -L "https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64"
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign

      - name: Check out code
        uses: actions/checkout@v7

      - name: Test
        run: bats unittests_bash

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './test'
          ignore_paths: './test/conftest.sh ./test/selftest.sh'  # for now
  gitlint:
    name: Run gitlint checks
    if: ${{ github.event_name == 'pull_request' }}  # we can test only PRs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install gitlint into container
        run: python -m pip install gitlint
      - name: Run gitlint check
        run: gitlint --commits origin/${{ github.event.pull_request.base.ref }}..HEAD
